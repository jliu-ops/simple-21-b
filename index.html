<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/brython/3.12.0/brython.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/brython/3.12.0/brython_stdlib.min.js"></script>
    <style>
        body { 
            background-color: #000; 
            color: #00FF00; 
            font-family: 'Courier New', Courier, monospace; 
            padding: 40px;
            line-height: 1.6;
        }
        #output { white-space: pre-wrap; margin-bottom: 20px; }
        .win { color: #55FF55; font-weight: bold; font-size: 1.2em; }
        .lose { color: #FF5555; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body onload="brython()">
    <div id="output"></div>
    
    <script type="text/python">
import random
from browser import document, prompt

def log(text, class_name=""):
    span = document.createElement('div')
    span.text = str(text)
    if class_name:
        span.classList.add(class_name)
    document['output'] <= span

# --- GAME LOGIC ---
sticks = 21
m = 3
while sticks % (m+1) == 0:
    m = random.randint(1,3)

log("=== 21 STICKS GAME ===")
log(f"You may remove 1 through {m} sticks.")
log("The player that removes the last stick wins.\n")

while sticks > 0:
    log(f"There are {sticks} sticks remaining.")
    
    # This creates a browser popup for input
    user_val = prompt(f"How many sticks (1-{m})?")
    
    try:
        take = int(user_val)
        if take < 1 or take > m:
            log("!! Invalid move. Try again.")
            continue
    except:
        continue

    sticks -= take
    if sticks <= 0:
        log("\n🎉 YOU REMOVED THE LAST STICK! YOU WIN!", "win")
        break

    # AI Move
    state = sticks % (m+1)
    ai = state if state != 0 else random.randint(1, m)
    
    log(f"Opponent takes {ai} sticks.")
    sticks -= ai
    
    if sticks <= 0:
        log("\n💀 OPPONENT TOOK THE LAST STICK. OPPONENT WINS!", "lose")
        break
    </script>
</body>
</html>
